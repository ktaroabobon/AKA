version: 2

updates:
  # ルート pnpm workspace の依存関係（bot / ai を含む）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    # 細かい update が PR スパムにならないように関連 deps をまとめる
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      types:
        patterns:
          - "@types/*"
      hono:
        patterns:
          - "hono"
          - "@hono/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # GitHub Actions の workflow で使うアクション
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
