name: Deploy ai to Cloud Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "デプロイ対象の Git ref (ブランチ / タグ / SHA)"
        required: false
        type: string
        default: master

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: aka-ai-api
  GCP_REGION: asia-northeast1
  SERVICE_NAME: aka-ai-api-service
  IMAGE: asia.gcr.io/aka-ai-api/aka-ai-api-service-image
  GEMINI_MODEL: gemini-3.5-flash

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve image tag (commit SHA)
        id: tag
        run: echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & push image (Cloud Build)
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${{ steps.tag.outputs.value }} \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:latest \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,GEMINI_MODEL=${{ env.GEMINI_MODEL }}

      - name: Smoke test (/health)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Service URL: $URL"
          curl -fsS "$URL/health"
