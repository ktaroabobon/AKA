name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    name: lint / typecheck / test / build / oapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Typecheck
        run: pnpm -r typecheck

      - name: AI tests
        run: pnpm --filter ai test

      - name: Bot tests
        run: pnpm --filter bot test

      - name: Bot build
        run: pnpm --filter bot build

      - name: OpenAPI generated types check
        run: make oapi/check-gen
