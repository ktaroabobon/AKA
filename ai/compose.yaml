services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: ./api/Dockerfile
    env_file:
      - ./api/.env
    volumes:
      - ./api/:/app
    ports:
      - "8000:8000"
    tty: true
    
  api-prod:
    container_name: api-prod
    build:
      context: ./api
      dockerfile: ./Dockerfile.deploy
    ports:
      - "8080:8080"
    tty: true

volumes:
  cache-api:
  cache-api-prod:
