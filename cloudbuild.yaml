steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "ai/Dockerfile"
      - "-t"
      - "asia.gcr.io/$PROJECT_ID/aka-ai-api-service-image:latest"
      - "-t"
      - "asia.gcr.io/$PROJECT_ID/aka-ai-api-service-image:${_IMAGE_TAG}"
      - "."
images:
  - "asia.gcr.io/$PROJECT_ID/aka-ai-api-service-image:latest"
  - "asia.gcr.io/$PROJECT_ID/aka-ai-api-service-image:${_IMAGE_TAG}"
substitutions:
  _IMAGE_TAG: manual
options:
  machineType: E2_HIGHCPU_8
  # デフォルトの GCS ログバケットには SA が閲覧権限を持たず
  # `gcloud builds submit` がログ stream 失敗で exit 1 する。
  # Cloud Logging 専用にすることで GCS バケット権限を不要にする。
  logging: CLOUD_LOGGING_ONLY
